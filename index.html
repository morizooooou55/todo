<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Todo Calendar</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="calendar-pane" aria-label="カレンダー">
        <header class="topbar">
          <div>
            <p class="kicker">やることカレンダー</p>
            <h1 id="monthLabel">2026年4月</h1>
          </div>
          <div class="month-controls" aria-label="月の移動">
            <button class="icon-button" id="prevMonth" type="button" aria-label="前の月" title="前の月">‹</button>
            <button class="today-button" id="todayButton" type="button">今日</button>
            <button class="icon-button" id="nextMonth" type="button" aria-label="次の月" title="次の月">›</button>
          </div>
        </header>

        <div class="weekday-row" aria-hidden="true">
          <span>日</span>
          <span>月</span>
          <span>火</span>
          <span>水</span>
          <span>木</span>
          <span>金</span>
          <span>土</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </section>

      <aside class="task-pane" id="taskPane" aria-label="タスク">
        <header class="task-header">
          <div>
            <p class="kicker">えらんだ日</p>
            <h2 id="selectedDateLabel">2026年4月27日</h2>
          </div>
          <div class="stats" id="dayStats">0/0</div>
        </header>

        <form class="task-form" id="taskForm">
          <label>
            <span>やること</span>
            <input id="taskTitle" name="title" type="text" autocomplete="off" placeholder="例: 企画メモを書く" required />
          </label>
          <div class="form-row">
            <label>
              <span>日付</span>
              <input id="taskDate" name="date" type="date" required />
            </label>
            <label>
              <span>優先度</span>
              <select id="taskPriority" name="priority">
                <option value="normal">通常</option>
                <option value="high">高</option>
                <option value="low">低</option>
              </select>
            </label>
          </div>
          <button class="primary-button" type="submit">追加</button>
        </form>

        <div class="filter-bar" role="tablist" aria-label="タスク表示">
          <button class="filter active" type="button" data-filter="all">すべて</button>
          <button class="filter" type="button" data-filter="open">未完了</button>
          <button class="filter" type="button" data-filter="done">完了</button>
        </div>

        <div class="task-list" id="taskList"></div>
      </aside>
    </main>

    <template id="taskTemplate">
      <article class="task-item">
        <button class="check-button" type="button" aria-label="完了を切り替え"></button>
        <div class="task-copy">
          <strong></strong>
          <span></span>
        </div>
        <button class="delete-button" type="button" aria-label="削除" title="削除">×</button>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
